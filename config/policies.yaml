external_send:
  require_approval: true

config_mutation:
  require_backup: true
  require_validation: true

retries:
  max_attempts: 3
  require_backoff: true

verification:
  required_for:
    - code
    - browser
    - messaging

executors:
  research:
    enabled: true
    model: default
    role: gather_and_summarize
  code:
    enabled: true
    model: default
    role: modify_and_test
  browser:
    enabled: true
    model: default
    role: navigate_and_extract
  messaging:
    enabled: true
    model: default
    role: draft_or_send_with_approval

loop_control:
  allow_self_requeue_forever: false
  require_evidence: true

cost_control:
  prefer_condensed_state: true
  prefer_low_cost_observation: true
