name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check — all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" | xargs python -m py_compile && echo "All Python files passed syntax check."

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Pytest — discover and run tests
        run: pytest tests/ -v --tb=short
